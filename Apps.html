<html>

     <title>Apps</title>

    <body>
     <script>
        var choice=prompt("Welcome to Area Calculator. /n Please enter your choice. /n 1. Area of rectangle. /n 2. Area of triangle. /n 3. Area of Circle. /n 4. Area of pararellogram.")

if(choice=="1") {
    var l=prompt('Enter the length')
    var b=prompt('Enter the breadth')
    var result=Number(l)*Number(b)
    alert('The Area is '+result)
}
if(choice=="2"){
    var h=prompt('Enter the height')
    var b=prompt('Enter the base')
    var result=Number(h)*Number(b)
    alert('The Area is'+result)
}
if(choice=="3"){
    var r=prompt('Enter the radius')
    var result="3.14"*Number(r)*Number(r)
     alert('The Area is'+result)
}
if(choice=="4"){
    var h=prompt('Enter the height')
    var cb=prompt('Enter the coressponding base')
    var result=Number(h)*Number(cb)
    alert('The Area is'+result)
}

     </script>
